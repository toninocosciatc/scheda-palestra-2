<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" />
  <meta name="description" content="Scheda palestra personale con progressi, menu esercizi e rating fatica." />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="style.css" />
  <title>Scheda Palestra</title>
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Workout personale</p>
      <h1>Scheda Palestra</h1>
    </div>
    <button id="installBtn" class="ghost-btn hidden" type="button">Installa</button>
  </header>

  <main>
    <section class="today-card">
      <div>
        <p class="small-label">Allenamento del giorno</p>
        <input id="workoutDate" class="date-input" type="date" />
      </div>
      <div class="summary">
        <span id="savedCount">0 esercizi salvati</span>
      </div>
    </section>

    <nav id="dayTabs" class="tabs" aria-label="Giorni scheda"></nav>

    <section id="dayHeader" class="day-header"></section>

    <section class="quick-tools">
      <button id="openAllBtn" class="secondary-btn compact" type="button">Apri tutti</button>
      <button id="closeAllBtn" class="secondary-btn compact" type="button">Chiudi tutti</button>
    </section>

    <section id="exerciseList" class="exercise-list"></section>

    <section class="actions">
      <button id="saveAllBtn" class="primary-btn" type="button">Salva allenamento</button>
      <button id="clearDayBtn" class="secondary-btn" type="button">Svuota giorno</button>
    </section>

    <section class="history-panel">
      <button id="toggleHistoryBtn" class="history-toggle" type="button">
        Storico allenamenti
        <span>Apri</span>
      </button>
      <div id="historyContent" class="history-content hidden"></div>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="app.js" defer></script>
</body>
</html>
