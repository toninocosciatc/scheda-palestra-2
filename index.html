<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" />
  <meta name="description" content="Scheda palestra personale con progressi, storico esercizi e rating fatica a cursore." />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="style.css" />
  <title>Scheda Palestra</title>
</head>
<body>
  <header class="app-header">
    <div>
      <p class="eyebrow">Workout personale</p>
      <h1>Scheda Palestra</h1>
    </div>
    <button id="installBtn" class="ghost-btn hidden" type="button">Installa</button>
  </header>

  <main>
    <section class="today-card">
      <div>
        <p class="small-label">Allenamento del giorno</p>
        <input id="workoutDate" class="date-input" type="date" />
      </div>
      <div class="summary">
        <span id="savedCount">0 salvati</span>
      </div>
    </section>

    <nav id="dayTabs" class="tabs" aria-label="Giorni scheda"></nav>

    <section id="dayHeader" class="day-header"></section>

    <section class="quick-tools" aria-label="Azioni rapide">
      <button id="openAllBtn" class="icon-btn" type="button" aria-label="Apri tutti gli esercizi" title="Apri tutti">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7 10l5 5 5-5" />
          <path d="M7 5l5 5 5-5" />
        </svg>
      </button>
      <button id="closeAllBtn" class="icon-btn" type="button" aria-label="Chiudi tutti gli esercizi" title="Chiudi tutti">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7 14l5-5 5 5" />
          <path d="M7 19l5-5 5 5" />
        </svg>
      </button>
    </section>

    <section id="exerciseList" class="exercise-list"></section>

    <section class="actions">
      <button id="saveAllBtn" class="primary-btn" type="button">Salva allenamento</button>
      <button id="clearDayBtn" class="secondary-btn" type="button">Svuota giorno</button>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="app.js" defer></script>
</body>
</html>
